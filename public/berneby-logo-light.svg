<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 240 48"
  role="img"
  aria-labelledby="berneby-logo-title-light"
>
  <title id="berneby-logo-title-light">Berneby Solutions Logo Light</title>

  <!-- B-Marke -->
  <g transform="matrix(1.3333333,0,0,-1.3333333,0,64)">
    <g transform="scale(0.1)">
      <path
        fill="#03f9f9"
        fill-rule="evenodd"
        d="m 3.92969,355.926 0.26953,-37.129 0.05469,-0.035 C 31.6406,317.855 53.543,297.043 53.543,271.5 53.543,245.805 31.3867,224.895 3.77734,224.219 L 4.07813,134.316 C 59.6289,138.797 103.988,181.43 104.762,242.109 105.504,300.309 61.9922,354.914 3.92969,355.926"
      />
      <path
        fill="#03f9f9"
        fill-rule="evenodd"
        d="M 3.77344,473.934 4.07031,444.773 C 58.0508,437.191 55.3477,367.426 4.14844,360.148 L 4.06641,319.117 C 102.242,325.789 95.7422,470.422 3.77344,473.934"
      />
    </g>
  </g>

  <!-- Wortmarke:
       - erneby bleibt zentriert neben dem B
       - Solutions kleiner, unten am B ausgerichtet
       - rechte Kante von Solutions endet exakt an der rechten Kante von erneby -->
  <g
    transform="translate(18,0)"
    font-family="'Barlow', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    letter-spacing="0.3"
  >
    <text
      x="0"
      y="29"
      textLength="61"
      lengthAdjust="spacingAndGlyphs"
      font-size="18"
      font-weight="700"
      fill="#283569"
    >
      erneby
    </text>
    <text
      x="0"
      y="46"
      textLength="61"
      lengthAdjust="spacingAndGlyphs"
      font-size="14"
      font-weight="400"
      fill="#283569"
      fill-opacity="0.8"
    >
      Solutions
    </text>
  </g>
</svg>

